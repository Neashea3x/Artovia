<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="nav">
        <div class="nav-left">ARTJECTIVE</div>
        <div class="nav-center">
            <a href="features.html">Features</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class ="nav-right">
            <button onclick="openLogin()">Login</button>
            <a href="register.html" class="signup">Sign Up</a>
    </nav>


    <section class="auth-container">

        <div class="auth-box">
            <h1 class="glow-text">Create Your Account</h1>
            <form>
                <input type="text" id="username" name="username" placeholder="Username" required aria-label="Enter your username">
                <input type="email" id="email" name="email" placeholder="Email" required aria-label="Enter your email address">
                <input type="password" id="password" name="password" placeholder="Password" required aria-label="Enter your password">
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required aria-label="Confirm your password">
                
                <button type="submit">Create Account</button>
                <p class="small-text">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                </p>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </form>
        </div>

    </section>

    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h2>Login</h2>

            <input type="email" id="email" name="email" placeholder="Email" required aria-label="Enter your email address">
            <input type="password" id="password" name="password" placeholder="Password" required aria-label="Enter your password">
        
            <button>Login</button>

            <p onclick="closeLogin()">Close</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
