<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artjective - register</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="images/favicon.svg">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body class="register">
    <header>
        <div class="logo">
            <img src="images/logo.svg" alt="Artjective Logo">
            <span>Artjective</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="reg-container content-box">
        <h1>Create Account</h1>
        <form>
            <input type="text" id="fullname" name="fullname" placeholder="Full name" required aria-label="Enter your full name">
            <input type="text" id="username" name="username" placeholder="Username" required aria-label="Choose a username">
            <input type="date" id="birthdate" name="birthdate" placeholder="Birthdate" required aria-label="Select your birth date">
            <input type="email" id="email" name="email" placeholder="Email" required aria-label="Enter your email address">
            <input type="password" id="password" name="password" placeholder="Password" required aria-label="Create a password">
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required aria-label="Confirm your password">
            <button type="submit" class="btn" aria-label="Create your new account">Create Account</button>
        </form>
        <p>Already have an account? <a href="login.html" aria-label="Go to login page">Login here</a></p>
    </div>

    <footer>
        <p>&copy; 2023 Artjective</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
