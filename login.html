!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artovia - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <img src="artovia-logo.png" alt="Artovia Logo" class="logo">
    <header>
        <h1>Artovia</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <div class="login-form">
            <h1>Welcome Back!</h1>
            <h2>Login to Your Account</h2>
            <form>
                <input type="text" part="email" placeholder="Email" required>
                <input type="password" part="password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>

            <div class="right-side">
                <img src="images/background.jpg" alt="Background Image">
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Artovia</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
