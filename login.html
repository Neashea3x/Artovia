<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artovia - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Artovia Logo">
            <span>Artovia</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <div class="login-form content-box">
                <h1>Welcome Back!</h1>
                <h2>Login to Your Account</h2>
                <form>
                    <input type="email" id="email" name="email" placeholder="Email" required aria-label="Enter your email address">
                    <input type="password" id="password" name="password" placeholder="Password" required aria-label="Enter your password">
                    <button type="submit" class="btn" aria-label="Sign in to your account">Login</button>
                </form>
                <p>Don't have an account? <a href="register.html" aria-label="Go to registration page">Register here</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Artovia</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
