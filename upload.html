<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artovia - Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Artovia</div>
        <nav>
            <a href="homepage.html">Home</a>
            <a href="upload.html">Upload</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <div class="upload-container">
        <h1>Upload Your Artwork</h1>
        <form id="upload-form">
            <input type="file" id="artwork-input" accept="image/*" required>
            <label for="artwork-input">Choose Artwork</label>
            <input type="text" id="artwork-title" placeholder="Artwork Title" required>
            <textarea id="artwork-description" placeholder="Artwork Description"></textarea>
            <button type="submit">Upload</button>
        </form>
    </div>

</body>
</html>
