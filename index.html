<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artjective - Home</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="images/favicon.svg">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <nav class="nav">
        <div class="nav-left">ARTJECTIVE</div>
        <div class="nav-center">
            <a href="features.html">Features</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class ="nav-right">
            <button onclick="openLogin()">Login</button>
            <a href="register.html" class="signup">Sign Up</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <img src="images/logo.svg" alt="Artjective Logo" class="hero-logo">
            <h1>Artjective</h1>
            <p>Unleash Your Creativity</p>

            <div class="button">
                <button class="primary" onclick="window.location.href='register.html'">Get Started</button>
                <button class="secondary" onclick="window.location.href='features.html'">Learn More</button>
            </div>
    </section>

    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h2>Login</h2>

            <input type="email" id="email" name="email" placeholder="Email" required aria-label="Enter your email address">
            <input type="password" id="password" name="password" placeholder="Password" required aria-label="Enter your password">
        
            <button>Login</button>

            <p onclick="closeLogin()">Close</p>
        </div>
    </div>

    <script src="script.js"></script>


</body>
</html>
